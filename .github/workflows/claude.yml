name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            You are working in the adp-devsite-utils repo — the central linting and build-script toolkit
            for Adobe Developer Platform (ADP) content repos. Issues filed here typically report deploy
            errors or linter false-positives/false-negatives.

            ## Repo Structure

            - Linter plugins: `linters/remark-lint-*.js`
            - Lint runner: `bin/runLint.js`
            - Build/utility scripts: `bin/`

            ## How Linters Work

            Each linter is a remark plugin `(tree, file) => { ... }` that walks the MDAST and reports issues:
            - `file.message(msg, position, ruleId)` — warning (non-fatal)
            - `file.fail(msg, position, ruleId)` — error (fatal)

            Linters are registered in `bin/runLint.js` via `.use(plugin, [severity])`.
            Always read `bin/runLint.js` and the relevant linter source files before making changes.

            ## Workflow When Handling an Issue

            1. **Understand the issue.** Read the issue title and description to identify the problem
               (deploy error, linter false positive, linter false negative, missing rule, etc.).

            2. **Cross-check against deploy rules.** Before fixing anything, fetch and review the
               deployment script at:
               https://raw.githubusercontent.com/AdobeDocs/adp-devsite-scripts/main/deploy.js

               Key deployment constraints enforced by deploy.js:
               - Only `.md` and `.json` files are deployable — all other file types are skipped.
               - Files must reside under `src/pages/` (this prefix is stripped to build the deploy URL).
               - Deploy URLs are constructed as: `{pathPrefix}/{file-relative-to-src/pages}`.
               - Non-deployable files or malformed paths cause deploy errors or silent skips.

               Determine whether the reported content violated one of these deployment rules.

            3. **Check for an existing linter.** Search `linters/remark-lint-*.js` and `bin/runLint.js`
               to see if a linter already covers the violated rule. Also check the linter's severity
               level (error vs warning) in `runLint.js`.

            4. **If a deployment rule was broken and no linter exists for it**, create a new linter:
               - Create `linters/remark-lint-<descriptive-name>.js` following the same plugin pattern
                 as the existing linters.
               - Register it in `bin/runLint.js` with the appropriate severity level.
               - Include the new linter in the same PR as the fix.

            5. **If fixing an existing linter** (false positive, false negative, crash, etc.):
               - Read the linter source to understand its current logic.
               - Apply the minimal change needed to fix the reported behavior.
               - Make sure the fix does not regress other valid detections.

            6. **Create a PR** with the fix on a branch named after the ticket number if one is
               provided (e.g., `DEVSITE-1234`), or a descriptive branch name otherwise.

            ## Important

            - Always read the relevant linter source AND `bin/runLint.js` before making changes.
            - Keep fixes minimal and focused — don't refactor unrelated code.
            - When creating a new linter, follow the exact conventions of existing linters
              (default export, ruleId naming, severity parameter support).

